name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - test
      - "releases/*"

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: "Qodana Scan"
        uses: JetBrains/qodana-action@v2024.3
        with:
          pr-mode: false
          use-caches: false
          args: --coverage-dir=coverage
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1819043438 }}
          QODANA_ENDPOINT: "https://qodana.cloud"
        timeout-minutes: 5

      - name: Install doctl
        run: |
          curl -sL https://github.com/digitalocean/doctl/releases/download/v1.104.0/doctl-1.104.0-linux-amd64.tar.gz | tar -xz
          sudo mv doctl /usr/local/bin
      - name: Authenticate with DigitalOcean
        run: doctl auth init -t ${{ secrets.DO_API_TOKEN }}

      - name: Trigger deploy in App Platform
        run: doctl apps create-deployment b2fc5d2c-dea5-489c-be85-838da272da74